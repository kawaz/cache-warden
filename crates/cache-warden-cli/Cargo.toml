[package]
name = "cache-warden-cli"
version.workspace = true
edition.workspace = true
description = "CLI for cache-warden, the secure secret cache"
publish = false

[[bin]]
name = "cache-warden"
path = "src/main.rs"

[dependencies]
cache-warden = { path = "../cache-warden" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
